<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Lao', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#F9F6F2] text-[#4A3728] min-h-screen flex flex-col">

    <header class="max-w-[1400px] w-full mx-auto px-6 py-8 flex items-center">
        <div class="flex-1">
            <a href="index.html" class="inline-flex items-center space-x-2 bg-[#8B5E3C] text-white px-4 py-2 rounded-lg hover:bg-[#6D4C41] transition shadow-md text-sm font-bold">
                <span>←</span>
                <span>ກັບໄປໜ້າຫຼັກ</span>
            </a>
        </div>
        <div class="text-center">
            <h1 class="serif text-4xl md:text-5xl text-[#8B5E3C]">Contact Us</h1>
            <p class="text-xs md:text-sm uppercase tracking-widest text-[#A67C52] font-semibold mt-1">ເພີ່ມສະເໜ່ດ້ວຍກິ່ນຫອມທີ່ເປັນທ່ານ</p>
        </div>
        <div class="flex-1"></div> </header>

    <main class="max-w-[1300px] w-full mx-auto px-6 pb-10 flex-grow flex items-start">
        <div class="grid grid-cols-1 lg:grid-cols-12 shadow-xl rounded-[1.5rem] overflow-hidden bg-[#FCF8F2] w-full min-h-[550px]">
            
            <div class="lg:col-span-5 relative bg-[#EAD7BB]">
                <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&q=80&w=1200" 
                     class="absolute inset-0 w-full h-full object-cover opacity-90 mix-blend-multiply">
                
                <div class="relative z-10 p-10 text-white h-full flex flex-col justify-between bg-black/20">
                    <div>
                        <h2 class="text-3xl font-bold mb-8 drop-shadow-md border-b border-white/30 pb-2">ຂໍ້ມູນຕິດຕໍ່</h2>
                        <div class="space-y-6 text-lg">
                            <div class="flex items-start space-x-4">
                                <span class="text-2xl">📍</span>
                                <p class="leading-snug drop-shadow-sm">ບ້ານ ສີຫອມ, ເມືອງ ຈັນທະບູລີ,<br>ນະຄອນຫຼວງວຽງຈັນ</p>
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="text-2xl">📞</span>
                                <p class="drop-shadow-sm">+856 20 5555 9999</p>
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="text-2xl">✉️</span>
                                <p class="drop-shadow-sm">luxury.scent@gmail.com</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex space-x-6 text-sm font-bold mt-10">
                        <a href="#" class="hover:underline">Facebook</a>
                        <a href="#" class="hover:underline">Instagram</a>
                        <a href="#" class="hover:underline">WhatsApp</a>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 p-10 bg-[#FCF8F2]">
                <h3 class="text-3xl font-bold mb-8 text-[#8B5E3C] border-b border-[#EAD7BB] pb-2">ສົ່ງຂໍ້ຄວາມຫາພວກເຮົາ</h3>
                <form class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-lg font-bold text-[#A67C52]">ຊື່ແທ້</label>
                            <input type="text" placeholder="First Name" class="w-full p-3 text-lg bg-white border border-[#EAD7BB] rounded-lg focus:ring-2 focus:ring-[#8B5E3C] outline-none transition">
                        </div>
                        <div class="space-y-2">
                            <label class="text-lg font-bold text-[#A67C52]">ນາມສະກຸນ</label>
                            <input type="text" placeholder="Last Name" class="w-full p-3 text-lg bg-white border border-[#EAD7BB] rounded-lg focus:ring-2 focus:ring-[#8B5E3C] outline-none transition">
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-lg font-bold text-[#A67C52]">ອີເມລ</label>
                        <input type="email" placeholder="Email Address" class="w-full p-3 text-lg bg-white border border-[#EAD7BB] rounded-lg focus:ring-2 focus:ring-[#8B5E3C] outline-none transition">
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-lg font-bold text-[#A67C52]">ຂໍ້ຄວາມ</label>
                        <textarea rows="3" placeholder="ຂຽນລາຍລະອຽດ..." class="w-full p-3 text-lg bg-white border border-[#EAD7BB] rounded-lg focus:ring-2 focus:ring-[#8B5E3C] outline-none transition"></textarea>
                    </div>
                    
                    <button class="w-full py-4 text-xl bg-[#8B5E3C] text-white uppercase tracking-wider font-bold hover:bg-[#6D4C41] transition duration-300 rounded-lg shadow-lg">
                        SUBMIT MESSAGE
                    </button>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
